<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rendezvous</title>
    <link rel="icon" href="images/logo3.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container mt-4">
      <form id="formulaire">
        <label class="form-label" for="nom">Entrer votre nom</label>
        <input
          class="form-control mb-3"
          type="text"
          placeholder=" ex:Medoune"
          id="nom"
          pattern="[A-Za-zÀ-ÿ\s-]+"
          required
        />
        <label class="form-label" for="numero"
          >Entrer votre numero de telephone</label
        >
        <input
          class="form-control mb-3"
          type="tel"
          placeholder="ex:77 000 00 00"
          id="numero"
          pattern="[0-9]{9}"
          required
        />
        <label class="form-label" for="adress">Entrer votre Adress</label>
        <input
          class="form-control mb-3"
          type="text"
          placeholder="ex:Thies Fahu 1"
          id="adress"
          pattern="[A-Za-zÀ-ÿ0-9\s]+"
          required
        />
        <select class="form-select mb-3" id="prestation" required>
          <option value="">Selectionner la prestation</option>
          <option value="degrade">Degrade</option>
          <option value="coifureSimple">Coifure Simple</option>
          <option value="loks">Loks</option>
        </select>

        <!--=====================================
        Type de rendez-vous
======================================-->

        <h4 class="titre-section">
          <i class="bi bi-geo-alt-fill"></i>

          Lieu du rendez-vous
        </h4>

        <div class="choix-lieu">
          <label class="carte-lieu">
            <input type="radio" name="lieu" value="salon" id="salon" checked />

            <i class="bi bi-shop"></i>

            <span> Au salon </span>
          </label>

          <label class="carte-lieu">
            <input type="radio" name="lieu" value="domicile" id="domicile" />

            <i class="bi bi-house-door-fill"></i>

            <span> À domicile </span>
          </label>
        </div>

        <!--=====================================
        Date
======================================-->

        <h4 class="titre-section">
          <i class="bi bi-calendar-event-fill"></i>

          Choisir une date
        </h4>

        <input
          class="form-control champ-rdv mb-4"
          type="date"
          id="date"
          required
        />

        <!--=====================================
        Heure
======================================-->

        <h4 class="titre-section">
          <i class="bi bi-clock-fill"></i>

          Choisir une heure
        </h4>

        <input
          class="form-control champ-rdv mb-4"
          type="time"
          id="time"
          required
        />

        <button class="btn-confirmer-rdv" type="submit" id="button">
          <i class="bi bi-check-circle-fill"></i>

          Confirmer le rendez-vous
        </button>
      </form>

      <div
        id="recapitulatif"
        class="alert alert-success mt-4"
        style="display: none"
      ></div>
    </div>

    <div class="modal fade" id="modaleGalerie" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Toutes les réalisations</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body" id="galerie-complete"></div>
        </div>
      </div>
    </div>

    <!--=====================================
        Bottom Navigation
======================================-->

    <nav class="bottom-nav">
      <a href="index.html" class="bottom-item">
        <i class="bi bi-house-door-fill"></i>

        <span>Accueil</span>
      </a>

      <a href="index.html#liste-coiffeurs" class="bottom-item">
        <i class="bi bi-scissors"></i>

        <span>Coiffeurs</span>
      </a>

      <a href="#" class="bottom-item active" id="btnBottomRdv">
        <i class="bi bi-calendar2-check-fill"></i>

        <span>RDV</span>
      </a>

      <a href="#" class="bottom-item">
        <i class="bi bi-heart-fill"></i>

        <span>Favoris</span>
      </a>

      <a href="dashboard.html" class="bottom-item">
        <i class="bi bi-person-fill"></i>

        <span>Compte</span>
      </a>
    </nav>

    <script src="js/data.js"></script>
    <script src="js/rendezvous.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
