<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rendezvous</title>
    <link rel="icon" href="images/logo3.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container mt-4">
      <form id="formulaire">
        <label class="form-label" for="nom">Entrer votre nom</label>
        <input
          class="form-control mb-3"
          type="text"
          placeholder=" ex:Medoune"
          id="nom"
          pattern="[A-Za-zÀ-ÿ\s-]+"
          required
        />
        <label class="form-label" for="numero"
          >Entrer votre numero de telephone</label
        >
        <input
          class="form-control mb-3"
          type="tel"
          placeholder="ex:77 000 00 00"
          id="numero"
          pattern="[0-9]{9}"
          required
        />
        <label class="form-label" for="adress">Entrer votre Adress</label>
        <input
          class="form-control mb-3"
          type="text"
          placeholder="ex:Thies Fahu 1"
          id="adress"
          pattern="[A-Za-zÀ-ÿ0-9\s]+"
          required
        />
        <select class="form-select mb-3" id="prestation" required>
          <option value="">Selectionner la prestation</option>
          <option value="degrade">Degrade</option>
          <option value="coifureSimple">Coifure Simple</option>
          <option value="loks">Loks</option>
        </select>

        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="lieu"
            value="salon"
            id="salon"
            checked
          />
          <label class="form-check-label" for="salon">Au salon</label>
        </div>
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="radio"
            name="lieu"
            value="domicile"
            id="domicile"
          />
          <label class="form-check-label" for="domicile">À domicile</label>
        </div>

        <input class="form-control mb-3" type="date" id="date" required />
        <input class="form-control mb-3" type="time" id="time" required />
        <button class="btn btn-primary" type="submit" id="button">
          Confirmer
        </button>
      </form>

      <div
        id="recapitulatif"
        class="alert alert-success mt-4"
        style="display: none"
      ></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/rendezvous.js"></script>
  </body>
</html>
