<!-- ICI on ajoute la modale ,Modale Boostrap qui va affcher toutes les realisation et elle reste cachée jusqu'au clic sur le bouton +1 et là le contenu sera rempli dynamiquement par profil.js-->
<div class="modal fade" id="modaleGalerie" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <!-- on a ici l'entete de la modale -->
      <div class="modal-header">
        <h5 class="modal-title">Toutes les réalisations</h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>
      </div>

      <!--  ci on a le container qui va recevoir toutes le pohots-->
      <div class="modal-body" id="galerie-complete"></div>

    </div>
  </div>
</div>
