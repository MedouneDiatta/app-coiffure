<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>profils</title>

    <link rel="icon" href="images/logo3.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="container mt-4" id="profil-container">
      <!-- Cache tant que profil.js n'a pas rempli toutes les infos,
           puis passe en display:block a la fin du script -->
      <div id="carte-profil" style="display: none">
        <!-- =====================================================
                  EN-TÊTE PREMIUM DU PROFIL
        ====================================================== -->

        <div class="banniere-profil">
          <img src="images/bernard.jpg" alt="Bannière" class="image-banniere" />
        </div>

        <!-- ===================== PHOTO + IDENTITÉ ===================== -->

        <div class="entete-profil">
          <!-- Ici profil.js remplira automatiquement les informations -->

          <div id="identite"></div>
        </div>

        <!-- ===================== ACTIONS ===================== -->

        <div class="actions-profil">
          <a href="rendezvous.html?id=1" class="btn-reserver">
            <i class="bi bi-calendar-check-fill"></i>

            Réserver
          </a>

          <div class="actions-secondaires">
            <button class="btn-secondaire">
              <i class="bi bi-house-door-fill"></i>

              Domicile
            </button>

            <button class="btn-secondaire">
              <i class="bi bi-chat-dots-fill"></i>

              Message
            </button>
          </div>
        </div>

        <!-- ===================== DOMICILE / ZONE ===================== -->

        <div id="domicile" class="p-3"></div>

        <!-- ===================== PRESTATIONS ===================== -->

        <div id="prestations"></div>

        <!-- ===================== PLANNING / HORAIRES ===================== -->

        <div class="bloc-infos">
          <div
            class="entete-bloc"
            id="btnHoraires"
            data-bs-toggle="collapse"
            data-bs-target="#planning"
            role="button"
            aria-expanded="false"
            aria-controls="planning"
          >
            <span>
              <i class="bi bi-clock-fill"></i>
              Planning hebdomadaire
            </span>
            <i class="bi bi-chevron-down"></i>
          </div>

          <div id="planning" class="collapse"></div>
        </div>

        <!-- ===================== AVIS CLIENTS ===================== -->

        <h3 class="titre-section">
          <i class="bi bi-chat-square-text-fill"></i>
          Avis clients
        </h3>

        <div id="avis"></div>

        <!-- ===================== GALERIE ===================== -->

        <h3 class="titre-section">
          <i class="bi bi-images"></i>
          Galerie
        </h3>

        <div id="realisations"></div>
      </div>
      <!-- fin #carte-profil -->

      <!-- Modale Bootstrap : affiche toutes les realisations,
           remplie dynamiquement par profil.js au clic sur le +X -->
      <div class="modal fade" id="modaleGalerie" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Toutes les réalisations</h5>

              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>

            <div class="modal-body" id="galerie-complete"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/profil.js"></script>

    <!-- JavaScript Bootstrap : necessaire pour les modales, dropdown, etc. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
