<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>profils</title>

    <link rel="icon" href="images/logo3.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="container mt-4" id="profil-container">
      <!-- =====================================================
                EN-TÊTE PREMIUM DU PROFIL
====================================================== -->

<div class="banniere-profil">

    <img
        src="images/bernard.jpg"
        alt="Bannière"
        class="image-banniere"
    >

</div>

<!-- ===================== PHOTO + IDENTITÉ ===================== -->

<div class="entete-profil">

    <!-- Ici profil.js remplira automatiquement les informations -->

    <div id="identite"></div>

</div>

<!-- ===================== ACTIONS ===================== -->

<div class="actions-profil">

    <a
        href="rendezvous.html?id=1"
        class="btn-reserver"
    >

        <i class="bi bi-calendar-check-fill"></i>

        Réserver

    </a>

    <div class="actions-secondaires">

        <button
            class="btn-secondaire"
            id="btnHoraires"
        >

            <i class="bi bi-clock-fill"></i>

            Horaires

        </button>

        <button
            class="btn-secondaire"
        >

            <i class="bi bi-chat-dots-fill"></i>

            Message

        </button>

    </div>

</div>

<!-- ===================== PRESTATIONS ===================== -->

<div id="prestations"></div>

<div id="prestations"></div>

<a href="rendezvous.html?id=1" class="btn btn-primary">
    Prendre un rendez-vous
</a>

<!-- Ici on ajoute la modale (Modale Boostrap qui va affcher toutes les realisation et elles restent cachées jusqu'au clic sur le bouton +X et là le contenu sera rempli dynamiquement par profil.js)-->
<div class="modal fade" id="modaleGalerie" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">

      <!-- on a ici l'entete de la modale -->
      <div class="modal-header">
        <h5 class="modal-title">Toutes les réalisations</h5>

        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>
      </div>

      <!--  ci on a le container qui va recevoir toutes le pohots-->
      <div class="modal-body" id="galerie-complete"></div>

    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/profil.js"></script>

<!--JavaScript boostrap est :necessaire pour les modale, dropdown,etc  -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
